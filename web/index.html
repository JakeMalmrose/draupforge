<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>draupforge</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="game"></canvas>

  <div id="run-status"></div>

  <div id="hud">
    <div class="bar life"><div id="life-fill" class="fill"></div><span id="life-text"></span></div>
    <div class="bar mana"><div id="mana-fill" class="fill"></div><span id="mana-text"></span></div>
    <div id="xp-row">
      <span id="level-badge"></span>
      <div class="bar xp"><div id="xp-fill" class="fill"></div></div>
    </div>
  </div>

  <div id="panel" class="hidden">
    <h2>Equipment</h2>
    <div id="equipment" class="inv-grid"></div>
    <h2>Inventory <span id="inv-count"></span></h2>
    <div id="inventory" class="inv-grid"></div>
    <p class="hint">drag to equip/unequip &middot; drag onto the ground to drop</p>
  </div>

  <div id="tooltip" class="hidden"></div>

  <div id="log"></div>

  <div id="passive-chooser" class="hidden"></div>

  <div id="overlay" class="hidden">
    <div id="overlay-text">YOU DIED</div>
    <button onclick="location.reload()">rise again</button>
  </div>

  <div id="help">click move/pickup/stairs/portal &middot; <b>Q</b> fireball &middot; <b>E</b> nova &middot; <b>R</b> spark &middot; <b>T</b> adrenaline &middot; <b>P</b> plant portal &middot; <b>I</b> inventory</div>

  <script src="net.js"></script>
  <script src="client.js"></script>
</body>
</html>
