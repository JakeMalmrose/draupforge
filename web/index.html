<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>draupforge</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="game"></canvas>

  <div id="hud">
    <div class="bar life"><div id="life-fill" class="fill"></div><span id="life-text"></span></div>
    <div class="bar mana"><div id="mana-fill" class="fill"></div><span id="mana-text"></span></div>
  </div>

  <div id="panel" class="hidden">
    <h2>Equipment</h2>
    <ul id="equipment"></ul>
    <h2>Inventory <span id="inv-count"></span></h2>
    <ul id="inventory"></ul>
    <p class="hint">click to equip/unequip · right-click to drop</p>
  </div>

  <div id="log"></div>

  <div id="overlay" class="hidden">
    <div id="overlay-text">YOU DIED</div>
    <button onclick="location.reload()">rise again</button>
  </div>

  <div id="help">click move/pickup &middot; <b>Q</b> fireball &middot; <b>E</b> nova &middot; <b>R</b> spark &middot; <b>I</b> inventory</div>

  <script src="net.js"></script>
  <script src="client.js"></script>
</body>
</html>
